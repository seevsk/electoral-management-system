<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Partidos - Actualizar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="h3 mb-3">Actualizar Partido</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/parties/update/{id}(id=${party.id})}" th:object="${party}" method="post" class="row g-3">
                <div class="col-12">
                    <label for="name" class="form-label">Nombre</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}" required>
                </div>
                <div class="col-12 col-md-4">
                    <label for="acronym" class="form-label">Siglas</label>
                    <input id="acronym" type="text" class="form-control" th:field="*{acronym}" required>
                </div>
                <div class="col-12 col-md-8">
                    <label for="representative" class="form-label">Representante</label>
                    <input id="representative" type="text" class="form-control" th:field="*{representative}" required>
                </div>
                <div class="col-12 col-md-6">
                    <label for="listPosition" class="form-label">Posicion Lista</label>
                    <input id="listPosition" type="number" class="form-control" min="1" th:field="*{listPosition}" required>
                </div>
                <div class="col-12 col-md-6">
                    <label for="logoUrl" class="form-label">URL del Logo</label>
                    <input id="logoUrl" type="url" class="form-control" th:field="*{logoUrl}">
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <a th:href="@{/admin/parties/list}" class="btn btn-outline-secondary">Regresar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
