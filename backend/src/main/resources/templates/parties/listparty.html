<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Partidos - Listado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Partidos Politicos</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-primary" th:href="@{/admin/parties/register}">Registrar Partido</a>
            <a class="btn btn-outline-dark" th:href="@{/admin/parties/disable}">Habilitar/Deshabilitar</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Siglas</th>
                    <th>Representante</th>
                    <th>Imagen</th>
                    <th>Posicion Lista</th>
                    <th>Estado</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(parties)}">
                    <td colspan="7" class="text-center text-secondary">No se encontraron partidos.</td>
                </tr>
                <tr th:each="party : ${parties}">
                    <td>
                        <img th:if="${party.logoUrl != null and !#strings.isEmpty(party.logoUrl)}"
                             th:src="${party.logoUrl}"
                             alt="Logo partido"
                             style="width: 40px; height: 40px; object-fit: cover; border-radius: 50%;">
                        <span th:if="${party.logoUrl == null or #strings.isEmpty(party.logoUrl)}" class="text-secondary">Sin imagen</span>
                    </td>
                    <td th:text="${party.name}"></td>
                    <td th:text="${party.acronym}"></td>
                    <td th:text="${party.representative}"></td>
                    <td th:text="${party.listPosition}"></td>
                    <td>
                        <span class="badge" th:classappend="${party.isActive} ? ' text-bg-success' : ' text-bg-secondary'"
                              th:text="${party.isActive} ? 'Activo' : 'Inactivo'"></span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-warning" th:href="@{/admin/parties/update/{id}(id=${party.id})}">Actualizar</a>
                        <a class="btn btn-sm btn-outline-danger" th:href="@{/admin/parties/disable/{id}(id=${party.id})}">Deshabilitar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
