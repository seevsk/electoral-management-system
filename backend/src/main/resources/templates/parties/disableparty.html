<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Partidos - Habilitar Deshabilitar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Habilitar o Deshabilitar Partidos</h1>
        <a class="btn btn-outline-dark" th:href="@{/admin/parties/list}">Regresar</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Siglas</th>
                    <th>Estado</th>
                    <th class="text-center">Habilitar</th>
                    <th class="text-center">Deshabilitar</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(parties)}">
                    <td colspan="6" class="text-center text-secondary">No se encontraron partidos.</td>
                </tr>
                <tr th:each="party : ${parties}">
                    <td th:text="${party.id}"></td>
                    <td th:text="${party.name}"></td>
                    <td th:text="${party.acronym}"></td>
                    <td th:text="${party.isActive} ? 'Activo' : 'Inactivo'"></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-warning" th:href="@{/admin/parties/enable/{id}(id=${party.id})}">Seleccionar</a>
                    </td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-danger" th:href="@{/admin/parties/disable/{id}(id=${party.id})}">Seleccionar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
